name: Deploy Container Explorer

# 触发：数据推送（由本地 sync.py 推送 data.json.gz/meta.json 触发）或手动 Run workflow
# 注意：SFTP 拉取与数据累积已在本地 sync.py 完成，本流程只负责发布，绝不重新转换/覆盖数据。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Pages 官方部署需要这两个权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署互相覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js data.json.gz meta.json _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
