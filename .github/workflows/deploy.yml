name: Build & Deploy Container Explorer

# 触发：推送到 main、每日定时（UTC 02:00 = 上海 10:00）、手动 Run workflow
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

# Pages 官方部署需要这两个权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署互相覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet openpyxl

      # SFTP 拉取（可选）：连不上也不影响已部署的站点，会沿用仓库内现有 data.json.gz
      - name: Try download Excel from SFTP
        id: sftp
        continue-on-error: true
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_REMOTE: ${{ secrets.FTP_REMOTE }}   # 远端 xlsx 路径，如 /Master Data - Leah/近4月VesselBapfile.xlsx
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp || true
          rm -f /tmp/source.xlsx
          # 内网 SFTP：连不上(黑洞)由 net:connect-timeout 快速失败；连得上则给足下载时间(硬上限 timeout 600)
          timeout 600 lftp -u "$FTP_USER","$FTP_PASS" -p "$FTP_PORT" sftp://"$FTP_HOST" \
            -e "set net:connect-timeout 15; set net:timeout 120; set net:max-retries 1; get '$FTP_REMOTE' -o /tmp/source.xlsx; quit" || true
          ls -lh /tmp/source.xlsx || true

      # 有新版就转换；没有（SFTP 连不上）就沿用仓库现有 data.json.gz
      - name: Convert to data.json.gz
        run: |
          if [ -s /tmp/source.xlsx ]; then
            python scripts/convert.py /tmp/source.xlsx --out data.json.gz --meta meta.json --gzip
          else
            echo "未获取到新数据，沿用仓库内现有 data.json.gz"
          fi

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js data.json.gz meta.json _site/
          cp -r scripts _site/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
